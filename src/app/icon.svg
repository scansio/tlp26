<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0c0e1a"/>
      <stop offset="100%" stop-color="#101428"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="90" ry="90" fill="url(#bg)"/>

  <!-- Indigo top accent bar -->
  <rect x="90" y="0" width="332" height="5" rx="2.5" fill="#6366f1" opacity="0.95"/>

  <!-- Subtle indigo glow behind "26" -->
  <ellipse cx="256" cy="360" rx="160" ry="60" fill="#6366f1" opacity="0.07"/>

  <!-- TLP — primary mark, white, heavy -->
  <text
    x="256" y="248"
    font-family="'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="164"
    font-weight="800"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-6"
  >TLP</text>

  <!-- 26 — sub-mark, indigo -->
  <text
    x="256" y="384"
    font-family="'Inter', -apple-system, 'Helvetica Neue', Arial, sans-serif"
    font-size="120"
    font-weight="700"
    fill="#6366f1"
    text-anchor="middle"
    letter-spacing="-4"
  >26</text>
</svg>
